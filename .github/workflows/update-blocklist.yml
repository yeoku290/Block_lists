name: Update Blocklist

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點自動執行
  workflow_dispatch:        # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run blocklist merger
        run: python scripts/merge_blocklist.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet blocklist.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNT=$(grep -v '^#' blocklist.txt | grep -v '^$' | wc -l | tr -d ' ')
          git add blocklist.txt
          git commit -m "chore: update blocklist (${COUNT} domains) [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
